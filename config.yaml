upstream:
  url: "https://github.com/spack/spack-packages.git"
  base_branch: "develop"

output_repo:
  url: "https://github.com"
  push_branch: "integration-result"

local_folders:
  path: "./workdir"
  # Optional clone path selector.
  # - missing/empty -> defaults to "clone"
  # - absolute path -> used as is
  # - relative path -> joined to local_folders.path
  clone: "clone"
  # Optional repo path selector.
  # - missing/empty -> repo action disabled
  # - absolute path -> used as is
  # - relative path -> joined to local_folders.path
  # repo: "repo"

